<div class="ui-section">
  <h3>1. Карта</h3>
  <label for="map-loader">Загрузить JPG</label>
  <input type="file" id="map-loader" accept="image/jpeg">
  <label>Масштаб карты (метры):</label>
  <div class="map-scale-inputs">
    <input type="number" id="map-width-meters" value="2000" placeholder="Ширина">
    <input type="number" id="map-height-meters" value="1500" placeholder="Высота">
  </div>
</div>
<div class="ui-section">
  <h3>2. Редактор Слоев</h3>
  <input type="text" id="layer-name-input" placeholder="Имя слоя">
  <select id="layer-type-select">
    <option value="forest">Лес</option>
    <option value="city">Город</option>
    <option value="height">Высота</option>
  </select>
  <button id="add-layer-btn">Добавить Слой</button>
  <div id="layer-list"></div>
</div>
<div class="ui-section">
  <h3>3. Инструменты</h3>
  <label for="brush-size">Размер кисти: <span id="brush-size-value">20</span></label>
  <input type="range" id="brush-size" min="5" max="100" value="20">
</div>
<div class="ui-section">
  <h3>4. Добавление Юнитов</h3>
  <label for="unit-display-name">Название юнита:</label>
  <input type="text" id="unit-display-name" placeholder="Напр., 1-й взвод">
  <label for="unit-type-select">Тип:</label>
  <select id="unit-type-select">
    <option value="infantry">Пехота</option>
    <option value="tank">Танк</option>
    <option value="bmp">БМП</option>
    <option value="atgm">ПТУР</option>
    <option value="artillery">Артиллерия</option>
  </select>
  <label for="unit-side-select">Сторона:</label>
  <select id="unit-side-select">
    <option value="1">Сторона 1</option>
    <option value="2">Сторона 2</option>
  </select>
  <label for="unit-color-select">Цвет:</label>
  <select id="unit-color-select"></select>
  <button id="add-unit-btn">Добавить Юнит</button>
</div>
